name: travel_plan
version: 1.0.0
capability: 根据天气和景点信息规划旅游行程
method: |
  结合天气和景点信息,给出按时段安排的旅游行程。
  - 优先考虑天气适宜的户外景点
  - 雨天调整为室内景点
  - 行程按上午/下午/晚上三段组织
patterns:
  - 行程
  - 旅游
  - 旅行
  - 玩几天
  - 怎么玩
  - 厦门怎么玩
  - 厦门行程
tags:
  - 旅游
  - 行程
source: builtin
author: system
steps:
  - id: fetch_weather
    name: 查询目的地天气
    description: 获取用户指定城市和日期的天气
    tool: weather_query
    params:
      city: ${user_input.city}
      date: tomorrow
    retry: 2
    timeout_s: 20

  - id: fetch_attractions
    name: 搜索景点
    description: 根据城市搜索推荐景点
    tool: web_search
    params:
      query: "${fetch_weather.data.city} 旅游景点推荐"
    depends_on: [fetch_weather]
    retry: 1
    timeout_s: 30

  - id: synthesize_plan
    name: 整合行程
    description: 按 method 整合天气与景点,生成行程(由 Orchestrator 负责)
    depends_on: [fetch_weather, fetch_attractions]